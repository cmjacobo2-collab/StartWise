<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StartWise — Your 12-Week Business Launch Planner</title>

  <!-- PWA / installable app -->
  <meta name="theme-color" content="#1B344F" />
  <meta name="description" content="Plan, budget, price, and grow your small business — from idea to launch and beyond. By Across the Table." />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="StartWise" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />

  <!-- Across the Table design system -->
  <link rel="stylesheet" href="styles.css" />

  <style>
    /* Page-level token override: remap near-black surfaces/text to the app's deep navy */
    :root {
      --ink-900: #091D30;
      --navy-950: #091D30;
      --navy-900: #091D30;
      --text-strong: #091D30;
      --bg-dark: #091D30;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    body {
      background: var(--cream-50);
      color: var(--text-body);
      font-family: var(--font-sans);
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    #root { min-height: 100vh; }
    button { font-family: var(--font-sans); }
    input, select, textarea { font-family: var(--font-sans); }
    ::selection { background: var(--gold-100); }
    *::-webkit-scrollbar { width: 10px; height: 10px; }
    *::-webkit-scrollbar-thumb { background: var(--sand-300); border-radius: 999px; border: 2px solid var(--cream-50); }
    *::-webkit-scrollbar-track { background: transparent; }
    [data-density="compact"] table td { padding-top: 7px !important; padding-bottom: 7px !important; }
    [data-density="compact"] table { font-size: 12.5px !important; }
    button:hover { filter: brightness(0.97); }
    a { color: var(--text-link); }
    @keyframes sw-spin { to { transform: rotate(360deg); } }

    html, body { max-width: 100%; overflow-x: hidden; }

    /* ---- Mobile / responsive (phones & small tablets) ---- */
    @media (max-width: 760px) {
      #root main { padding: 16px 14px 40px !important; max-width: 100% !important; }
      #root header { padding: 11px 14px !important; }
      #root main [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      #root main svg { max-width: 100%; height: auto; }
      #root main table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; white-space: nowrap; }
      #root [style*="max-width: 580px"],
      #root [style*="max-width: 560px"],
      #root [style*="max-width: 460px"] { max-width: 94vw !important; }
    }

    #__sw_boot_error {
      display: none; position: fixed; inset: 0; z-index: 9999;
      place-items: center; padding: 24px; text-align: center;
      background: var(--cream-50, #FBF8F2); color: #091D30;
      font-family: var(--font-sans, system-ui, sans-serif);
    }
    #__sw_boot_error .card {
      max-width: 440px; background: #fff; border: 1px solid #E0D9CB;
      border-radius: 14px; padding: 28px 26px;
      box-shadow: 0 14px 30px -14px rgba(20,40,63,0.25);
    }
    #__sw_boot_error h1 { font: 800 22px var(--font-display, system-ui); margin: 0 0 10px; }
    #__sw_boot_error p { font-size: 14.5px; line-height: 1.55; color: #344150; margin: 0 0 8px; }
    #__sw_boot_error code { font-family: var(--font-mono, monospace); font-size: 12.5px; background: #F4EFE5; padding: 1px 6px; border-radius: 6px; }
  </style>

  <!-- Runtime libraries: jsDelivr primary, unpkg fallback, no SRI hashes -->
  <script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script>window.React || document.write('<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"><\/script>');</script>

  <script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script>window.ReactDOM || document.write('<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"><\/script>');</script>

  <script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script>window.Babel || document.write('<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"><\/script>');</script>

  <!-- Design system bundle (plain JS) + seed data modules (plain JS) -->
  <script src="ds-bundle.js"></script>
  <script src="data.js"></script>
  <script src="source-data.js"></script>
  <script src="affirmations.js"></script>
  <script src="knowledge-data.js"></script>
  <script src="biz-data.js"></script>
  <script src="vendor-library.js"></script>
  <script src="task-catalog.js"></script>
</head>
<body>
  <div id="root"></div>

  <div id="__sw_boot_error">
    <div class="card">
      <h1>StartWise couldn't finish loading</h1>
      <p>The app needs its runtime libraries (React and Babel) and an internet connection the first time it loads.</p>
      <p>If this keeps happening, reload the page. The app is served from <code>cmjacobo2-collab.github.io/StartWise/</code>.</p>
    </div>
  </div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" fill="#FBF8F2"/>
      <rect x="154" y="154" width="204" height="204" rx="46" fill="#1B344F"/>
      <text x="256" y="246" font-family="Arial, sans-serif" font-weight="800" font-size="96" fill="#FBF8F2" text-anchor="middle" dominant-baseline="middle">SW</text>
      <rect x="218" y="300" width="76" height="12" rx="6" fill="#C8962E"/>
    </svg>
  </template>

  <!-- App modules (JSX, transpiled in-browser by Babel) -->
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="charts.jsx"></script>
  <script type="text/babel" src="shell.jsx"></script>
  <script type="text/babel" src="ai-setup.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="screens-core.jsx"></script>
  <script type="text/babel" src="screens-more.jsx"></script>
  <script type="text/babel" src="screens-extra.jsx"></script>
  <script type="text/babel" src="screens-finance.jsx"></script>
  <script type="text/babel" src="screens-revenue.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>

  <!-- Boot guard: show a clear message instead of a blank page if libraries never load -->
  <script>
    window.addEventListener("load", function () {
      setTimeout(function () {
        var mounted = document.getElementById("root") && document.getElementById("root").childElementCount > 0;
        if (!window.React || !window.Babel || !mounted) {
          var el = document.getElementById("__sw_boot_error");
          if (el) el.style.display = "grid";
        }
      }, 2500);
    });
  </script>

  <!-- Service worker for offline / installability -->
  <script>
    if ("serviceWorker" in navigator) {
      var swRefreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", function () {
        if (swRefreshing) return; swRefreshing = true; window.location.reload();
      });
      window.addEventListener("load", function () {
        navigator.serviceWorker.register("service-worker.js").then(function (reg) {
          reg.update();
          if (reg.waiting) reg.waiting.postMessage("skipWaiting");
          reg.addEventListener("updatefound", function () {
            var nw = reg.installing;
            if (nw) nw.addEventListener("statechange", function () {
              if (nw.state === "installed" && navigator.serviceWorker.controller) nw.postMessage("skipWaiting");
            });
          });
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
